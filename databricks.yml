# This is a Databricks asset bundle definition for KineticLake.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: KineticLake
  uuid: fb223a8a-bcfe-4f64-9492-747762aac405

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-891038f1-fa57.cloud.databricks.com
    variables:
      catalog: iot_data
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-891038f1-fa57.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/huthaifa.jadallah@hotmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/huthaifa.jadallah@hotmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: iot_data
      schema: prod
    permissions:
      - user_name: huthaifa.jadallah@hotmail.com
        level: CAN_MANAGE
