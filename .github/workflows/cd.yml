name: CD - Deploy to Databricks

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'resources/**'
      - 'databricks.yml'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli

      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databrickscfg
          cat > ~/.databrickscfg <<EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          jobs-api-version = 2.1
          EOF
          chmod 600 ~/.databrickscfg

      - name: Deploy with Databricks Bundle
        run: |
          pip install databricks-labs-blueprint
          databricks bundle deploy --target dev
        working-directory: ${{ github.workspace }}

      - name: Validate deployment
        run: |
          databricks bundle validate --target dev
        working-directory: ${{ github.workspace }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    concurrency:
      group: staging-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli databricks-labs-blueprint

      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databrickscfg
          cat > ~/.databrickscfg <<EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          jobs-api-version = 2.1
          EOF
          chmod 600 ~/.databrickscfg

      - name: Deploy with Databricks Bundle
        run: |
          databricks bundle deploy --target staging
        working-directory: ${{ github.workspace }}

      - name: Run integration tests
        run: |
          echo "Running integration tests against staging..."
          # Add your integration tests here

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: prod
    concurrency:
      group: prod-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Databricks CLI
        run: |
          pip install databricks-cli databricks-labs-blueprint

      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databrickscfg
          cat > ~/.databrickscfg <<EOF
          [DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST_PROD }}
          token = ${{ secrets.DATABRICKS_TOKEN_PROD }}
          jobs-api-version = 2.1
          EOF
          chmod 600 ~/.databrickscfg

      - name: Create deployment backup
        run: |
          echo "Creating backup of current production state..."
          # Add backup logic here

      - name: Deploy with Databricks Bundle
        run: |
          databricks bundle deploy --target prod
        working-directory: ${{ github.workspace }}

      - name: Verify deployment
        run: |
          databricks bundle validate --target prod
        working-directory: ${{ github.workspace }}

      - name: Create deployment tag
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "deploy-$(date +%Y%m%d-%H%M%S)" -m "Production deployment"
          git push origin --tags

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment completed successfully"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Production deployment failed"
          exit 1
